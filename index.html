<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Henry Pall Wulff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#1B2A32; }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; }
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:var(--navy); color:#fff;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; text-align:center; padding:2rem;
  }
  .wrap{ max-width:640px; }
  h1{ font-weight:600; font-size:clamp(2rem,6vw,3.5rem); letter-spacing:.02em; }
  .rule{ width:64px; height:2px; background:#fff; opacity:.6; margin:1.5rem auto; }
  p{ font-weight:400; font-size:1.05rem; line-height:1.7; opacity:.85; }
  .tag{ text-transform:uppercase; letter-spacing:.25em; font-size:.75rem; opacity:.6; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="tag">Narrating the poles</div>
    <div class="rule"></div>
    <h1>Henry P&aacute;ll Wulff</h1>
    <div class="rule"></div>
    <p>A new site is being built. Dispatches, field notes, lectures, the Curiously Polar podcast, and books &mdash; coming soon.</p>
  </div>
</body>
</html>
